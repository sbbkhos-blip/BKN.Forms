<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>แบบสำรวจยานพาหนะไฟฟ้า (EV) โรงพยาบาลบึงกาฬ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E2A28;
  --paper:#F6FAF7;
  --paper-2:#EDF4EE;
  --card:#FFFFFF;
  --teal:#0B4A46;
  --teal-2:#0E635D;
  --volt:#8CE24B;
  --volt-deep:#5FAE28;
  --amber:#FFB627;
  --line:#DCE7DE;
  --muted:#5B7570;
  --danger:#D64545;
  --radius:18px;
  --shadow: 0 10px 30px -12px rgba(11,74,70,0.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 100% -10%, #E4F6D8 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 0%, #DCEFEA 0%, transparent 55%),
    var(--paper);
  color:var(--ink);
  font-family:'Sarabun',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Kanit',sans-serif;}
#app{max-width:560px;margin:0 auto;padding:20px 16px 100px;min-height:100vh;position:relative;}

/* ---------- Top bar ---------- */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.bolt-badge{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(145deg,var(--volt),var(--volt-deep));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px -4px rgba(95,174,40,0.55);
  flex-shrink:0;
}
.bolt-badge svg{width:22px;height:22px;}
.topbar .titles{line-height:1.25;}
.topbar .titles .eyebrow{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.03em;}
.topbar .titles .name{font-family:'Kanit',sans-serif;font-weight:700;font-size:16px;color:var(--teal);}

/* ---------- Hero ---------- */
.hero{
  background:linear-gradient(160deg,var(--teal) 0%, var(--teal-2) 65%, #12746C 100%);
  border-radius:24px;
  padding:26px 22px 24px;
  color:#EAF7F0;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
  margin-bottom:18px;
}
.hero::after{
  content:"";
  position:absolute; right:-40px; top:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle, rgba(140,226,75,0.35), transparent 70%);
}
.hero h1{font-size:22px;line-height:1.35;margin:0 0 8px;font-weight:700;}
.hero p{font-size:13.5px;line-height:1.6;color:#CFE8DD;margin:0;position:relative;z-index:1;}
.deadline-chip{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;
  background:rgba(140,226,75,0.16);
  border:1px solid rgba(140,226,75,0.4);
  color:var(--volt);
  padding:7px 12px;border-radius:999px;font-size:12.5px;font-weight:600;
  position:relative;z-index:1;
}

/* ---------- Battery step progress ---------- */
.battery{display:flex;align-items:center;gap:8px;margin:4px 0 22px;}
.battery .cells{display:flex;gap:4px;flex:1;}
.battery .cell{flex:1;height:9px;border-radius:4px;background:var(--line);transition:background .3s;}
.battery .cell.filled{background:linear-gradient(90deg,var(--volt-deep),var(--volt));}
.battery .tip{width:5px;height:16px;border-radius:0 3px 3px 0;background:var(--line);}
.battery .label{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}

/* ---------- Cards / menu ---------- */
.menu-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:20px;
  display:flex;gap:14px;align-items:flex-start;
  border:1px solid var(--line);
  box-shadow:0 6px 18px -12px rgba(11,42,40,0.25);
  cursor:pointer;
  margin-bottom:14px;
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.menu-card:active{transform:scale(0.98);}
.menu-card:hover{border-color:var(--volt-deep);box-shadow:0 10px 24px -10px rgba(95,174,40,0.35);}
.menu-icon{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#EAF7EA,#D9F0DC);
  color:var(--teal-2);
}
.menu-icon svg{width:24px;height:24px;}
.menu-text .t{font-family:'Kanit',sans-serif;font-weight:600;font-size:15.5px;color:var(--ink);margin-bottom:3px;}
.menu-text .d{font-size:13px;color:var(--muted);line-height:1.5;}
.menu-arrow{margin-left:auto;color:var(--muted);align-self:center;flex-shrink:0;}

.footer-links{display:flex;gap:10px;margin-top:22px;}
.footer-link{
  flex:1;text-align:center;padding:12px 10px;border-radius:14px;
  background:var(--card);border:1px solid var(--line);
  font-size:12.5px;font-weight:600;color:var(--teal-2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.footer-link:hover{border-color:var(--teal-2);}
.footer-link svg{width:18px;height:18px;}

/* ---------- Section / step card ---------- */
.section-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;box-shadow:0 6px 18px -14px rgba(11,42,40,0.2);
}
.section-title{font-family:'Kanit',sans-serif;font-weight:600;font-size:15px;color:var(--teal);margin:0 0 4px;display:flex;align-items:center;gap:8px;}
.section-sub{font-size:12.5px;color:var(--muted);margin:0 0 16px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px;}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:5px;}
input[type=text],input[type=tel],input[type=number],textarea{
  width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px;font-family:'Sarabun',sans-serif;font-size:14.5px;color:var(--ink);
  background:#FCFDFC;transition:border-color .15s;
}
input:focus,textarea:focus{outline:none;border-color:var(--teal-2);}
textarea{min-height:90px;resize:vertical;}

.lookup-row{display:flex;gap:8px;}
.lookup-row input{flex:1;}
.btn-lookup{
  background:var(--teal);color:#fff;border:none;border-radius:12px;padding:0 16px;
  font-family:'Kanit',sans-serif;font-weight:500;font-size:13.5px;cursor:pointer;flex-shrink:0;
}
.btn-lookup:active{transform:scale(0.97);}

.autofill-box{
  margin-top:10px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  display:none;
}
.autofill-box.show{display:block;}
.autofill-box .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.autofill-box .row span:first-child{color:var(--muted);}
.autofill-box .row span:last-child{font-weight:600;color:var(--ink);}

.msg{border-radius:12px;padding:11px 14px;font-size:13px;margin-top:10px;display:none;}
.msg.show{display:block;}
.msg.error{background:#FDECEC;color:var(--danger);border:1px solid #F5C6C6;}
.msg.warn{background:#FFF6E3;color:#8A5A00;border:1px solid #FADFA0;}
.msg.ok{background:#EAF7E4;color:var(--volt-deep);border:1px solid #C8EBB4;}

/* radio / choice pills */
.choice-group{display:flex;flex-direction:column;gap:9px;}
.choice{
  display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px;cursor:pointer;transition:border-color .15s, background .15s;
}
.choice:hover{border-color:var(--teal-2);}
.choice.selected{border-color:var(--volt-deep);background:#F2FBEC;}
.choice .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;position:relative;}
.choice.selected .dot{border-color:var(--volt-deep);}
.choice.selected .dot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--volt-deep);}
.choice .txt{font-size:14px;color:var(--ink);font-weight:500;}

/* vehicle rows */
.vehicle-card{border:1.5px dashed var(--line);border-radius:14px;padding:14px;margin-bottom:12px;position:relative;background:#FCFDFC;}
.vehicle-card .vh-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.vehicle-card .vh-num{font-family:'Kanit',sans-serif;font-weight:600;font-size:13px;color:var(--teal-2);}
.vh-remove{border:none;background:none;color:var(--danger);font-size:12.5px;cursor:pointer;font-weight:600;}
.vh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.vh-grid .full{grid-column:1/-1;}
.vh-grid label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.vh-grid input{padding:9px 11px;font-size:13.5px;}
.btn-add{
  width:100%;border:1.5px dashed var(--teal-2);color:var(--teal-2);background:#F5FAF8;
  border-radius:12px;padding:11px;font-family:'Kanit',sans-serif;font-weight:500;font-size:13.5px;cursor:pointer;
}

/* ---------- Bottom nav ---------- */
.bottom-bar{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(246,250,247,0.92);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;z-index:20;
}
.bottom-bar-inner{max-width:560px;margin:0 auto;display:flex;gap:10px;width:100%;}
.btn{
  flex:1;border:none;border-radius:14px;padding:14px;font-family:'Kanit',sans-serif;font-weight:600;
  font-size:14.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-primary{background:linear-gradient(135deg,var(--volt-deep),var(--volt));color:#0E2A28;box-shadow:0 8px 18px -8px rgba(95,174,40,0.55);}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:#fff;color:var(--teal);border:1.5px solid var(--line);flex:0 0 auto;padding:14px 18px;}
.btn-ghost:active{transform:scale(0.98);}

/* ---------- Back / header row for sub pages ---------- */
.page-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.back-btn{width:38px;height:38px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.page-head h2{font-size:17px;margin:0;color:var(--teal);font-weight:600;}

/* ---------- Summary page ---------- */
.stat-hero{
  background:linear-gradient(160deg,var(--teal),var(--teal-2));
  border-radius:20px;padding:22px;color:#fff;text-align:center;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.stat-hero .big{font-family:'Kanit',sans-serif;font-size:42px;font-weight:700;color:var(--volt);line-height:1;}
.stat-hero .cap{font-size:13px;color:#CFE8DD;margin-top:6px;}
.stat-hero .sub{font-size:12px;color:#AFCFC3;margin-top:10px;}

.dept-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.dept-row:last-child{border-bottom:none;}
.dept-row .info{flex:1;min-width:0;}
.dept-row .dname{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dept-row .dcount{font-size:11.5px;color:var(--muted);margin-top:2px;}
.dept-row .bar-track{height:7px;background:var(--paper-2);border-radius:4px;overflow:hidden;margin-top:6px;}
.dept-row .bar-fill{height:100%;background:linear-gradient(90deg,var(--volt-deep),var(--volt));border-radius:4px;}
.dept-row .pct{font-family:'Kanit',sans-serif;font-weight:600;font-size:13px;color:var(--teal-2);width:44px;text-align:right;flex-shrink:0;}
.dept-row .check{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.check.yes{background:#E7F7DF;color:var(--volt-deep);}
.check.no{background:#F3F3F3;color:#B5B5B5;}

.password-gate{text-align:center;padding:30px 10px;}
.password-gate .lock{width:56px;height:56px;border-radius:16px;background:linear-gradient(150deg,#EAF7EA,#D9F0DC);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--teal-2);}
.password-gate input{text-align:center;letter-spacing:.15em;font-size:18px;margin-top:12px;}

.setup-note{background:#FFF6E3;border:1px solid #FADFA0;border-radius:14px;padding:14px 16px;font-size:12.5px;color:#8A5A00;line-height:1.6;margin-bottom:16px;}
.setup-note b{display:block;margin-bottom:4px;font-family:'Kanit',sans-serif;}

.empty-state{text-align:center;padding:30px 10px;color:var(--muted);font-size:13px;}
.spinner{width:22px;height:22px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--volt-deep);animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

.confirm-card{background:#F2FBEC;border:1.5px solid #C8EBB4;border-radius:16px;padding:18px;text-align:center;}
.confirm-card svg{width:40px;height:40px;color:var(--volt-deep);margin-bottom:10px;}
.confirm-card h3{margin:0 0 6px;font-size:16px;color:var(--teal);}
.confirm-card p{margin:0;font-size:13px;color:var(--muted);line-height:1.6;}

@media(max-width:380px){
  .vh-grid{grid-template-columns:1fr;}
}
</style>

/* ======================= HELPERS ======================= */
function vId(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

function findPerson(id){
  const raw = String(id).trim();
  let p = PEOPLE.find(p => p.id === raw);
  if(!p && /^\d+$/.test(raw)){
    const normalized = String(parseInt(raw,10));
    p = PEOPLE.find(p => p.id === normalized);
  }
  return p;
}
function findCostCenter(code){
  const c = String(code).trim().toUpperCase();
  return COSTCENTERS.find(x => x.code.toUpperCase() === c);
}

async function loadRemoteData(){
  if(!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.indexOf('REPLACE') !== -1 || CONFIG.SCRIPT_URL.indexOf('__') !== -1){
    remoteData.error = 'noconfig';
    render();
    return;
  }
  try{
    const res = await fetch(CONFIG.SCRIPT_URL, {method:'GET'});
    const json = await res.json();
    remoteData.personalIds = (json.personalIds||[]).map(String);
    remoteData.deptCodes = (json.deptCodes||[]).map(String);
    remoteData.loaded = true;
    remoteData.error = false;
  }catch(err){
    remoteData.error = 'network';
  }
  render();
}

function vehiclesToText(list){
  return list.map((v,i)=>`${i+1}) ${v.type} รุ่น ${v.model||'-'} สี ${v.color||'-'} ทะเบียน/ครุภัณฑ์ ${v.plate||'-'}`).join(' | ');
}

async function postForm(payload){
  const res = await fetch(CONFIG.SCRIPT_URL, {
    method:'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

}

  return `<div class="battery"><div class="cells">${cells}</div><div class="tip"></div><div class="label">${label}</div></div>`;
}

function renderPersonalBottomBar(){
  const f = personalForm;
  if(f.step===5){
    return '';
  }

  if(f.step===4){ nextLabel='ส่งแบบสำรวจ'; nextFn='personalSubmit()'; }
  return `<div class="bottom-bar"><div class="bottom-bar-inner">
    <button class="btn btn-primary" id="p-next-btn" onclick="${nextFn}">${nextLabel}</button>
  </div></div>`;
}

function personalBack(){
  const f = personalForm;
  if(f.step===3) f.step=2;
  else if(f.step===4) f.step = f.vehicles.length? 3:2;
  else if(f.step>1) f.step--;
  else view='home';
  render();
}

function lookupPerson(){
  const val = document.getElementById('pid-input').value.trim();
  personalForm.id = val;
  const msg = document.getElementById('pid-msg');
  if(!val){ msg.textContent='กรุณากรอกรหัสประจำตัว'; msg.classList.add('show'); return; }
  const p = findPerson(val);
  if(!p){
    personalForm.person=null;
    msg.textContent='ไม่พบรหัสประจำตัวนี้ในระบบ กรุณาตรวจสอบอีกครั้ง';
    msg.classList.add('show');
    document.getElementById('pid-box').classList.remove('show');
    return;
  }
  if(remoteData.personalIds.includes(String(p.id))){
    personalForm.person=null;
    msg.textContent='รหัสนี้ได้ส่งแบบสำรวจไปแล้ว ไม่สามารถส่งซ้ำได้';
    msg.classList.add('show');
    document.getElementById('pid-box').classList.remove('show');
    return;
  }
  msg.classList.remove('show');
  personalForm.person = p;
  render();
}

function personalNext(){
  const f = personalForm;
  if(f.step===1){
    if(!f.person){ lookupPerson(); return; }
    f.step=2; render(); return;
  }
  if(f.step===2){
    if(!f.hasEV){ alert('กรุณาเลือกคำตอบ'); return; }
    if(f.hasEV==='ไม่มี'){ return; }
    if(f.vehicles.length===0) f.vehicles.push({type:'รถยนต์ไฟฟ้า (EV)',model:'',color:'',plate:''});
    f.step=3; render(); return;
  }
  if(f.step===3){
    f.step=4; render(); return;
  }
}

function setPersonalHasEV(val){ personalForm.hasEV=val; render(); }
function addPersonalVehicle(){ personalForm.vehicles.push({type:'รถยนต์ไฟฟ้า (EV)',model:'',color:'',plate:''}); render(); }
function removePersonalVehicle(i){ personalForm.vehicles.splice(i,1); render(); }
function updatePersonalVehicle(i,key,val){ personalForm.vehicles[i][key]=val; }
window.updatePersonalVehicle_type_0 = null;
// dynamic type setter proxy
for(let i=0;i<50;i++){
  window['updatePersonalVehicle_type_'+i] = (function(idx){ return function(val){ personalForm.vehicles[idx].type=val; render(); }; })(i);
}
function setPersonalBW(val){ personalForm.bringToWork=val; render(); }
function setPersonalWC(val){ personalForm.wantCharging=val; render(); }

async function personalSubmit(){
  const f = personalForm;
  if(f.hasEV==='มี'){
    if(!f.bringToWork || !f.wantCharging){ alert('กรุณาตอบคำถามให้ครบทุกข้อ'); return; }
    f.suggestion = document.getElementById('p-suggestion') ? document.getElementById('p-suggestion').value : f.suggestion;
  }
  const btn = document.getElementById('p-next-btn');
  if(btn){ btn.disabled=true; btn.textContent='กำลังส่งข้อมูล...'; }

  const payload = {
    formType:'personal',
    id: f.person.id,
    dept: f.person.dept,
    name: f.person.prefix + f.person.fname + ' ' + f.person.lname,
    hasEV: f.hasEV,
    vehicles: f.hasEV==='มี' ? f.vehicles : [],
    vehiclesText: f.hasEV==='มี' ? vehiclesToText(f.vehicles) : '',
    bringToWork: f.hasEV==='มี' ? f.bringToWork : '',
    wantCharging: f.hasEV==='มี' ? f.wantCharging : '',
    suggestion: f.suggestion || ''
  };

  try{
    const result = await postForm(payload);
    if(result.status==='duplicate'){
      alert('รหัสนี้ได้ส่งแบบสำรวจไปแล้ว');
      goHome(); return;
    }
    remoteData.personalIds.push(String(f.person.id));
    f.step=5; render();
  }catch(err){
    alert('ส่งข้อมูลไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่');
    if(btn){ btn.disabled=false; btn.textContent='ส่งแบบสำรวจ'; }
  }
}

    <div class="cap">หน่วยงานที่ส่งแบบสำรวจแล้ว</div>

    ${pageHead('สรุปผล · รายบุคคล', 'goHome()')}
    <div class="section-card">
      <div class="password-gate">
        <div class="lock">${ICONS.lock}</div>
        <div class="section-title" style="justify-content:center;">กรุณากรอกรหัสผ่าน</div>
        <div class="section-sub">หน้านี้จำกัดเฉพาะผู้ดูแลระบบ</div>
        <input type="text" id="pw-input" placeholder="รหัสผ่าน" value="${pwInput}">
        <div class="msg error" id="pw-msg"></div>
      </div>
    </div>
    <div class="bottom-bar"><div class="bottom-bar-inner">
      <button class="btn btn-primary" onclick="checkPassword()">ยืนยัน</button>
    </div></div>
    `;
  }

  const totalPeople = PEOPLE.length;
  const submittedIds = remoteData.personalIds.filter(id=>PEOPLE.some(p=>p.id===id));
  const submittedCount = submittedIds.length;
  const pct = totalPeople? Math.round((submittedCount/totalPeople)*1000)/10 : 0;

  const deptStats = DEPT_TOTALS.map(d=>{
    const submittedInDept = PEOPLE.filter(p=>p.dept===d.name && submittedIds.includes(p.id)).length;
    const t = d.total || 0;
    const p = t? Math.round((submittedInDept/t)*1000)/10 : 0;
    return {name:d.name, submitted:submittedInDept, total:t, pct:p};
  }).sort((a,b)=>b.pct-a.pct);

  const rows = deptStats.map(d=>`
    <div class="dept-row">
      <div class="info">
        <div class="dname">${d.name}</div>
        <div class="dcount">${d.submitted} / ${d.total} คน</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(d.pct,100)}%"></div></div>
      </div>
      <div class="pct">${d.pct}%</div>
    </div>
  `).join('');

  return `
  ${pageHead('สรุปผล · รายบุคคล', 'goHome()')}
  ${!remoteData.loaded && !remoteData.error ? `<div class="empty-state"><div class="spinner"></div><div style="margin-top:10px;">กำลังโหลดข้อมูล...</div></div>` : ''}
  ${remoteData.error==='noconfig' ? `<div class="setup-note"><b>ยังไม่เชื่อมต่อ Google Sheet</b>ยังไม่มีข้อมูลให้สรุปผล เนื่องจากยังไม่ได้ตั้งค่า Web app URL</div>`:''}
  ${remoteData.loaded ? `
  <div class="stat-hero">
    <div class="big">${pct}%</div>
    <div class="cap">บุคลากรที่ส่งแบบสำรวจแล้ว</div>
    <div class="sub">${submittedCount} จาก ${totalPeople} คน · อัปเดตแบบเรียลไทม์</div>
  </div>
  <div class="section-card">
    <div class="section-title">สัดส่วนตามหน่วยงาน</div>
    ${rows}
  </div>
  `:''}
  `;
}

function checkPassword(){
  const val = document.getElementById('pw-input').value;
  pwInput = val;
  if(val === CONFIG.SUMMARY_PASSWORD){
    summaryPwOk = true; render();
  } else {
    document.getElementById('pw-msg').textContent = 'รหัสผ่านไม่ถูกต้อง';
    document.getElementById('pw-msg').classList.add('show');
  }
}

/* ======================= EVENT DELEGATION HELPERS ======================= */
function attachHandlers(){
  const pidInput = document.getElementById('pid-input');
  if(pidInput){ pidInput.addEventListener('keydown', e=>{ if(e.key==='Enter') lookupPerson(); }); }
  const codeInput = document.getElementById('code-input');
  if(codeInput){ codeInput.addEventListener('keydown', e=>{ if(e.key==='Enter') lookupDept(); }); }
  const pwInputEl = document.getElementById('pw-input');
  if(pwInputEl){ pwInputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') checkPassword(); }); }
}

/* ======================= INIT ======================= */
render();
loadRemoteData();
</script>
</body>
</html>
